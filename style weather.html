<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StyleWeather ✨ 天氣穿搭助手</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #7c5c3a; --primary-light: #c4956a; --secondary: #c9788a;
  --bg: #fdf8f3; --card: #fff9f4; --card-border: #e8ddd0;
  --text: #4a3728; --text-muted: #9b8878;
}
body { font-family:'Segoe UI',-apple-system,system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
.header { background:linear-gradient(135deg,#8b6b4a,#c4956a 50%,#c9788a); padding:13px 20px; text-align:center; position:sticky; top:0; z-index:100; box-shadow:0 3px 16px rgba(140,100,70,.25); }
.header h1 { font-size:1.3rem; font-weight:800; letter-spacing:3px; color:#fff8f0; }
.header p { font-size:.76rem; opacity:.88; margin-top:2px; color:#ffe8d6; }
.nav { display:flex; background:var(--card); border-bottom:2px solid var(--card-border); overflow-x:auto; position:sticky; top:52px; z-index:99; }
.nav-btn { flex:1; min-width:75px; padding:9px 6px 7px; border:none; background:none; color:var(--text-muted); font-size:.74rem; cursor:pointer; transition:all .2s; display:flex; flex-direction:column; align-items:center; gap:3px; border-bottom:2.5px solid transparent; }
.nav-btn.active { color:var(--primary); border-bottom-color:var(--primary); }
.nav-btn:hover { color:var(--text); background:rgba(140,100,70,.05); }
.nav-icon { font-size:1.1rem; }
.main { padding:13px; max-width:500px; margin:0 auto; }
.card { background:var(--card); border:1.5px solid var(--card-border); border-radius:18px; padding:14px; margin-bottom:13px; box-shadow:0 2px 12px rgba(140,100,70,.08); }
.card-title { font-size:.76rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:1.2px; margin-bottom:11px; }
.weather-search { display:flex; gap:8px; margin-bottom:10px; }
.weather-search input { flex:1; background:var(--bg); border:1.5px solid var(--card-border); border-radius:10px; padding:9px 13px; color:var(--text); font-size:.87rem; outline:none; transition:border-color .2s; }
.weather-search input:focus { border-color:var(--primary-light); }
.btn { padding:9px 15px; border-radius:10px; border:none; cursor:pointer; font-size:.84rem; font-weight:700; transition:all .2s; }
.btn-primary { background:linear-gradient(135deg,var(--primary),#a07050); color:#fff8f0; }
.btn-primary:hover { opacity:.88; transform:translateY(-1px); }
.btn-sm { padding:6px 13px; font-size:.79rem; }
.weather-display { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
.weather-main { display:flex; align-items:center; gap:12px; }
.weather-icon { font-size:2.8rem; }
.weather-city { font-size:.93rem; font-weight:700; color:var(--primary); }
.weather-temp { font-size:2.3rem; font-weight:800; line-height:1; }
.weather-unit { font-size:.95rem; color:var(--text-muted); }
.weather-desc { color:var(--text-muted); font-size:.8rem; margin-top:3px; }
.weather-details { text-align:right; }
.weather-detail-item { font-size:.77rem; color:var(--text-muted); margin-bottom:4px; }
.temp-bar { height:6px; border-radius:3px; background:linear-gradient(to right,#7ab8e8,#7ac8a8,#c8c87a,#e8a87a,#e87a7a); margin:10px 0 4px; position:relative; }
.temp-indicator { position:absolute; top:-5px; width:16px; height:16px; background:white; border:3px solid var(--primary); border-radius:50%; transform:translateX(-50%); transition:left .6s cubic-bezier(.34,1.56,.64,1); box-shadow:0 2px 8px rgba(0,0,0,.15); }
.occasion-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.occasion-btn { display:flex; flex-direction:column; align-items:center; gap:4px; padding:9px 4px; background:var(--bg); border:2px solid var(--card-border); border-radius:13px; cursor:pointer; transition:all .2s; font-size:.72rem; color:var(--text-muted); }
.occasion-btn.active { border-color:var(--primary-light); color:var(--primary); background:rgba(196,149,106,.1); }
.occasion-icon { font-size:1.35rem; }
.style-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.style-btn { padding:8px 6px; background:var(--bg); border:2px solid var(--card-border); border-radius:9px; cursor:pointer; font-size:.79rem; color:var(--text-muted); text-align:center; transition:all .2s; }
.style-btn.active { border-color:var(--secondary); color:var(--secondary); background:rgba(201,120,138,.1); }

/* ── Character Display (Paper-doll hybrid) ── */
.char-stage {
  position:relative; width:300px; margin:10px auto 0;
  display:flex; flex-direction:column; align-items:center;
}
.char-face-wrap {
  position:relative; z-index:3; width:150px; height:150px;
  border-radius:50%; overflow:hidden;
  background:transparent;
  /* subtle glow */
  filter:drop-shadow(0 4px 18px rgba(196,149,106,.3));
}
.char-face-wrap img {
  width:100%; height:100%; object-fit:cover;
  border-radius:50%;
  transition:opacity .4s;
}
.char-face-wrap .face-loader {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-size:2.5rem; background:rgba(255,248,244,.7); border-radius:50%;
}
.char-body-wrap {
  position:relative; margin-top:-30px; /* overlap with bottom of face */
  width:300px; z-index:2;
}
.char-body-wrap svg { width:100%; overflow:visible; }

/* Label chips */
.char-labels {
  position:absolute; inset:0; pointer-events:none; z-index:10;
}
.char-label {
  position:absolute; background:#fffaf4; border:1.5px solid #ddd0c0;
  border-radius:20px; padding:3px 10px; font-size:.72rem; font-weight:700;
  color:#6b4a2a; white-space:nowrap; pointer-events:none;
  box-shadow:0 1px 6px rgba(140,100,70,.12);
}
.char-label::after {
  content:''; position:absolute; background:#c4a882;
  width:1px; height:28px;
}

/* ── rest of UI ── */
.outfit-description { margin-top:14px; text-align:center; font-size:.87rem; line-height:1.65; background:linear-gradient(135deg,rgba(196,149,106,.08),rgba(201,120,138,.08)); border:1.5px solid rgba(196,149,106,.25); border-radius:13px; padding:12px; }
.outfit-tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
.outfit-tag { padding:5px 12px; border-radius:20px; font-size:.74rem; border:1.5px solid; }
.tag-top { border-color:#c4956a; color:#8b5e3a; background:rgba(196,149,106,.12); }
.tag-bottom { border-color:#8aadcc; color:#3a6a8b; background:rgba(138,173,204,.12); }
.tag-outer { border-color:#7ab87a; color:#3a6e3a; background:rgba(122,184,122,.12); }
.tag-shoes { border-color:#b88a6a; color:#6b4a2a; background:rgba(184,138,106,.12); }
.tag-acc { border-color:#c9788a; color:#8b3a4a; background:rgba(201,120,138,.12); }
.record-btn { width:100%; padding:12px; border-radius:13px; background:linear-gradient(135deg,var(--primary),var(--secondary)); border:none; color:white; font-size:.88rem; font-weight:700; cursor:pointer; transition:opacity .2s,transform .2s; margin-top:12px; }
.record-btn:hover { opacity:.9; transform:translateY(-1px); }
.upload-zone { border:2px dashed var(--card-border); border-radius:13px; padding:22px; text-align:center; cursor:pointer; transition:all .2s; display:block; }
.upload-zone:hover { border-color:var(--primary-light); background:rgba(196,149,106,.04); }
.upload-zone input[type="file"] { display:none; }
.category-tabs { display:flex; gap:6px; overflow-x:auto; margin-bottom:11px; padding-bottom:2px; scrollbar-width:none; }
.category-tabs::-webkit-scrollbar { display:none; }
.category-tab { padding:5px 13px; background:var(--bg); border:1.5px solid var(--card-border); border-radius:20px; font-size:.78rem; cursor:pointer; white-space:nowrap; transition:all .2s; color:var(--text-muted); }
.category-tab.active { background:var(--primary); border-color:var(--primary); color:white; }
.wardrobe-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.wardrobe-item { aspect-ratio:1; border-radius:11px; overflow:hidden; border:2px solid var(--card-border); position:relative; cursor:pointer; transition:all .2s; }
.wardrobe-item:hover { border-color:var(--primary-light); transform:scale(1.04); }
.wardrobe-item img { width:100%; height:100%; object-fit:cover; }
.item-label { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(transparent,rgba(74,55,40,.75)); padding:8px 5px 4px; font-size:.67rem; color:#fff8f0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.item-delete { position:absolute; top:4px; right:4px; background:rgba(201,120,138,.88); color:white; border:none; border-radius:50%; width:20px; height:20px; font-size:.65rem; cursor:pointer; display:none; align-items:center; justify-content:center; }
.wardrobe-item:hover .item-delete { display:flex; }
.week-day-card { display:flex; gap:11px; padding:11px; background:var(--bg); border-radius:11px; margin-bottom:8px; align-items:center; border:1.5px solid var(--card-border); transition:background .2s; }
.week-day-card:hover { background:rgba(196,149,106,.06); }
.week-day-info { flex:1; }
.week-day-name { font-size:.88rem; font-weight:700; }
.week-day-weather { font-size:.76rem; color:var(--text-muted); margin-top:2px; }
.week-day-outfit { font-size:.76rem; color:var(--primary); margin-top:4px; }
.history-item { display:flex; gap:11px; padding:11px; background:var(--bg); border-radius:11px; margin-bottom:8px; align-items:flex-start; border:1.5px solid var(--card-border); }
.history-date { min-width:46px; text-align:center; font-size:.76rem; color:var(--text-muted); }
.history-date .day { font-size:1.45rem; font-weight:800; color:var(--primary); line-height:1; }
.notification-banner { background:linear-gradient(135deg,rgba(138,173,204,.22),rgba(122,184,122,.18)); border:1.5px solid rgba(138,173,204,.4); border-radius:13px; padding:11px 14px; margin-bottom:12px; display:flex; align-items:center; gap:10px; font-size:.82rem; }
.notification-banner .icon { font-size:1.35rem; flex-shrink:0; }
.loading { text-align:center; color:var(--text-muted); padding:24px; }
.spinner { display:inline-block; width:26px; height:26px; border:3px solid var(--card-border); border-top-color:var(--primary); border-radius:50%; animation:spin .75s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.tab-panel { display:none; }
.tab-panel.active { display:block; }
.gradient-text { background:linear-gradient(135deg,var(--primary),var(--secondary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(120px); background:var(--card); border:1.5px solid var(--primary); border-radius:13px; padding:11px 22px; font-size:.84rem; z-index:1000; transition:transform .3s cubic-bezier(.34,1.56,.64,1); white-space:nowrap; box-shadow:0 8px 24px rgba(140,100,70,.2); }
.toast.show { transform:translateX(-50%) translateY(0); }
.empty-state { text-align:center; padding:34px 20px; color:var(--text-muted); }
.empty-state .emoji { font-size:2.7rem; margin-bottom:10px; }
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--card-border); border-radius:2px; }
</style>
</head>
<body>

<div class="header">
  <h1>✨ StyleWeather</h1>
  <p id="headerDate">天氣穿搭智慧助手</p>
</div>
<nav class="nav">
  <button class="nav-btn active" onclick="switchTab('today',this)"><span class="nav-icon">👗</span><span>今日穿搭</span></button>
  <button class="nav-btn" onclick="switchTab('wardrobe',this)"><span class="nav-icon">👚</span><span>我的衣櫥</span></button>
  <button class="nav-btn" onclick="switchTab('weekly',this)"><span class="nav-icon">📅</span><span>週計劃</span></button>
  <button class="nav-btn" onclick="switchTab('history',this)"><span class="nav-icon">📖</span><span>穿搭歷史</span></button>
</nav>

<div class="main">

  <!-- TODAY -->
  <div id="tab-today" class="tab-panel active">
    <div id="notificationBanner" class="notification-banner" style="display:none;">
      <span class="icon">🔔</span><span id="notificationText"></span>
    </div>

    <div class="card">
      <div class="card-title">🌤 今日天氣</div>
      <div class="weather-search">
        <input type="text" id="cityInput" placeholder="城市名稱（Taipei · Tokyo · Seoul…）" onkeydown="if(event.key==='Enter')fetchWeather()">
        <button class="btn btn-primary" onclick="fetchWeather()">搜尋</button>
      </div>
      <div id="weatherDisplay">
        <div class="loading" style="padding:12px;">
          <div style="margin-bottom:10px;font-size:1.5rem;">🌍</div>
          <div>輸入城市或使用定位</div>
          <div style="display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap;">
            <button class="btn btn-primary btn-sm" onclick="getLocationWeather()">📍 我的位置</button>
            <button onclick="loadDemoWeather()" style="background:none;border:1.5px solid var(--card-border);color:var(--text-muted);padding:6px 13px;border-radius:8px;cursor:pointer;font-size:.78rem;">🎮 示範天氣</button>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🎯 今日場合</div>
      <div class="occasion-grid">
        <button class="occasion-btn active" onclick="setOccasion('casual',this)"><span class="occasion-icon">😊</span><span>日常</span></button>
        <button class="occasion-btn" onclick="setOccasion('work',this)"><span class="occasion-icon">💼</span><span>上班</span></button>
        <button class="occasion-btn" onclick="setOccasion('date',this)"><span class="occasion-icon">💕</span><span>約會</span></button>
        <button class="occasion-btn" onclick="setOccasion('sports',this)"><span class="occasion-icon">🏃</span><span>運動</span></button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">💅 穿搭風格</div>
      <div class="style-grid">
        <button class="style-btn active" onclick="setStyle('casual',this)">☕ 休閒</button>
        <button class="style-btn" onclick="setStyle('minimal',this)">⬜ 簡約</button>
        <button class="style-btn" onclick="setStyle('cute',this)">🌸 可愛</button>
        <button class="style-btn" onclick="setStyle('street',this)">🔥 街頭</button>
        <button class="style-btn" onclick="setStyle('formal',this)">👔 正式</button>
        <button class="style-btn" onclick="setStyle('sporty',this)">⚡ 運動</button>
      </div>
    </div>

    <div class="card" id="outfitCard" style="display:none;">
      <div class="card-title gradient-text">✨ 今日推薦穿搭</div>

      <!-- Paper-doll character stage -->
      <div class="char-stage">
        <!-- Labels layer (behind face, in front of body) -->
        <div class="char-labels" id="charLabels"></div>

        <!-- Face (DiceBear CDN) -->
        <div class="char-face-wrap">
          <div class="face-loader" id="faceLoader">👤</div>
          <img id="charFaceImg" alt="Character" style="opacity:0;"
               onload="this.style.opacity='1';document.getElementById('faceLoader').style.display='none';"
               onerror="this.style.display='none';">
        </div>

        <!-- Body SVG -->
        <div class="char-body-wrap">
          <svg id="charBodySvg" viewBox="0 0 300 310" xmlns="http://www.w3.org/2000/svg" style="overflow:visible;"></svg>
        </div>
      </div>

      <div class="outfit-description" id="outfitDescription"></div>
      <div class="outfit-tags" id="outfitTags"></div>
      <button class="record-btn" onclick="recordOutfit()">📝 記錄今日穿搭</button>
    </div>
  </div>

  <!-- WARDROBE -->
  <div id="tab-wardrobe" class="tab-panel">
    <div class="card">
      <div class="card-title">👗 新增衣物</div>
      <div class="category-tabs" id="addCategoryTabs">
        <button class="category-tab active" data-cat="top">👕 上衣</button>
        <button class="category-tab" data-cat="bottom">👖 下著</button>
        <button class="category-tab" data-cat="outer">🧥 外套</button>
        <button class="category-tab" data-cat="shoes">👟 鞋子</button>
        <button class="category-tab" data-cat="acc">🎒 配件</button>
      </div>
      <label class="upload-zone">
        <input type="file" id="clothesUpload" accept="image/*" multiple onchange="handleUpload(event)">
        <div style="font-size:2rem;">📸</div>
        <div style="margin-top:7px;font-weight:700;font-size:.88rem;">點擊上傳衣物照片</div>
        <div style="font-size:.77rem;color:var(--text-muted);margin-top:3px;">JPG · PNG · WebP · 可多選</div>
      </label>
    </div>
    <div class="card">
      <div class="card-title">🗂 我的衣物 <span id="wardrobeCount" style="color:var(--primary-light);font-size:.9em;"></span></div>
      <div class="category-tabs" id="viewCategoryTabs">
        <button class="category-tab active" data-cat="all">全部</button>
        <button class="category-tab" data-cat="top">上衣</button>
        <button class="category-tab" data-cat="bottom">下著</button>
        <button class="category-tab" data-cat="outer">外套</button>
        <button class="category-tab" data-cat="shoes">鞋子</button>
        <button class="category-tab" data-cat="acc">配件</button>
      </div>
      <div class="wardrobe-grid" id="wardrobeGrid"></div>
    </div>
  </div>

  <!-- WEEKLY -->
  <div id="tab-weekly" class="tab-panel">
    <div class="card">
      <div class="card-title">📅 七天天氣穿搭規劃</div>
      <div id="weeklyForecast"><div class="loading"><div style="font-size:1.7rem;margin-bottom:10px;">🗓</div><div>請先在「今日穿搭」搜尋城市</div></div></div>
    </div>
  </div>

  <!-- HISTORY -->
  <div id="tab-history" class="tab-panel">
    <div class="card">
      <div class="card-title">📖 穿搭記錄 <span id="historyCount" style="color:var(--primary-light);font-size:.9em;"></span></div>
      <div id="historyList"></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
const S = {
  weather:null, forecast:null, occasion:'casual', style:'casual',
  wardrobe:[], history:[], addCat:'top', viewCat:'all',
};

// ─── INIT ─────────────────────────────────────────────────────────────────────
function init() {
  try { S.wardrobe = JSON.parse(localStorage.getItem('sw_wardrobe')||'[]'); } catch(e){ S.wardrobe=[]; }
  try { S.history  = JSON.parse(localStorage.getItem('sw_history')||'[]');  } catch(e){ S.history=[];  }
  const now = new Date();
  const days = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
  document.getElementById('headerDate').textContent =
    `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${days[now.getDay()]}`;
  setupCatTabs('addCategoryTabs', c => { S.addCat=c; });
  setupCatTabs('viewCategoryTabs', c => { S.viewCat=c; renderWardrobe(); });
  renderWardrobe(); renderHistory();
  if ('Notification' in window) Notification.requestPermission();
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-panel').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  btn.classList.add('active');
  if (tab==='weekly') renderWeekly();
  if (tab==='history') renderHistory();
}

// ─── WEATHER ──────────────────────────────────────────────────────────────────
async function fetchWeather() {
  const city = document.getElementById('cityInput').value.trim();
  if (!city) { showToast('請輸入城市名稱'); return; }
  await loadWeather(city);
}
async function getLocationWeather() {
  if (!navigator.geolocation) { showToast('不支援定位'); return; }
  showLoadingWeather();
  navigator.geolocation.getCurrentPosition(
    async p => await loadWeather(`${p.coords.latitude},${p.coords.longitude}`),
    () => { showToast('無法取得位置'); showInitWx(); }
  );
}
function showLoadingWeather() {
  document.getElementById('weatherDisplay').innerHTML =
    '<div class="loading"><div class="spinner"></div><div style="margin-top:10px;">載入天氣中…</div></div>';
}
function showInitWx() {
  document.getElementById('weatherDisplay').innerHTML = `
    <div class="loading" style="padding:12px;">
      <div style="margin-bottom:10px;font-size:1.5rem;">🌍</div><div>輸入城市或使用定位</div>
      <div style="display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap;">
        <button class="btn btn-primary btn-sm" onclick="getLocationWeather()">📍 我的位置</button>
        <button onclick="loadDemoWeather()" style="background:none;border:1.5px solid var(--card-border);color:var(--text-muted);padding:6px 13px;border-radius:8px;cursor:pointer;font-size:.78rem;">🎮 示範天氣</button>
      </div>
    </div>`;
}
async function loadWeather(loc) {
  showLoadingWeather();
  try {
    const res = await fetch(`https://wttr.in/${encodeURIComponent(loc)}?format=j1`, {signal:AbortSignal.timeout(8000)});
    if (!res.ok) throw new Error();
    const d = await res.json();
    const c=d.current_condition[0], a=d.nearest_area[0];
    S.weather = { temp:parseInt(c.temp_C), feelsLike:parseInt(c.FeelsLikeC), humidity:parseInt(c.humidity),
      wind:parseInt(c.windspeedKmph), desc:c.weatherDesc[0].value, code:parseInt(c.weatherCode),
      city:a.areaName[0].value+', '+a.country[0].value, uvIndex:parseInt(c.uvIndex||0), precip:parseFloat(c.precipMM) };
    S.forecast = d.weather;
    renderWx(); generateOutfit(); checkNotifications();

const FACE_SEEDS = {

function updateFace(style, occasion) {
  const seed = FACE_SEEDS[style] || FACE_SEEDS.casual;

  const url = `https://api.dicebear.com/9.x/lorelei/svg?seed=${encodeURIComponent(seed)}&backgroundColor=transparent&scale=90`;

function generateOutfit() {
  if (!S.weather) return;
  const w=S.weather, lvl=outfitByTemp(w.temp), rain=isRain(w);
  const outfit=lvl[S.occasion]||lvl.casual;
  const styleNotes={minimal:'選單色或雙色搭配，線條俐落更顯氣質。',cute:'加入碎花、蝴蝶結等可愛元素。',street:'大Logo、工裝讓街頭感更強烈。',formal:'剪裁俐落是重點，避免休閒元素。',sporty:'加入運動品牌，鮮明配色更活潑。',casual:''};
  let desc = outfit.desc;
  if(rain) desc+=' ☔ 外套選防潑水材質，記得帶傘！';
  if(w.humidity>80) desc+=' 💦 濕度偏高，選透氣排汗布料。';
  if(w.wind>25) desc+=' 💨 今天風大，注意防風。';
  if(styleNotes[S.style]) desc+=' '+styleNotes[S.style];

  document.getElementById('outfitCard').style.display='block';
  document.getElementById('outfitDescription').textContent=desc;
  const noOuter=!outfit.outer||outfit.outer.trim()==='';
  document.getElementById('outfitTags').innerHTML=[
    outfit.top&&`<span class="outfit-tag tag-top">👕 ${outfit.top}</span>`,
    !noOuter&&`<span class="outfit-tag tag-outer">🧥 ${outfit.outer}</span>`,
    outfit.bottom&&`<span class="outfit-tag tag-bottom">👖 ${outfit.bottom}</span>`,
    outfit.shoes&&`<span class="outfit-tag tag-shoes">👟 ${outfit.shoes}</span>`,

    rain&&`<span class="outfit-tag tag-acc">☂️ 雨傘（必備）</span>`,
  ].filter(Boolean).join('');

  // Update DiceBear face
  updateFace(S.style, S.occasion);
  // Draw body
  drawBody(w.temp, rain, S.occasion, S.style, outfit);
  // Render labels
  renderCharLabels(outfit, rain, w.temp);

      `}
    `}

    <!-- ARMS -->
    ${lvl==='freezing'?`

      <ellipse cx="78" cy="118" rx="10" ry="7" fill="${skin}"/>
      <ellipse cx="222" cy="118" rx="10" ry="7" fill="${skin}"/>

    <!-- Neck connector (smooth transition from DiceBear head) -->

    <!-- Bag / accessory -->
    ${!isSports?(isWork?`

      <line x1="38" y1="92" x2="72" y2="92" stroke="#6b5a4a" stroke-width="1.5"/>

    `:isDate?`
      <circle cx="46" cy="100" r="21" fill="#c4a882"/>

      <rect x="40" y="86" width="30" height="24" rx="5" fill="#8b6b4a"/>

    <!-- Scarf (cold) -->
    ${lvl==='cold'?`<path d="M100 28 Q150 38 200 28 L200 42 Q150 52 100 42 Z" fill="${isDate?'#d4a8b8':'#8aadcc'}" opacity=".88"/>`:``}

    <!-- Heavy scarf+hat (freezing) -->
    ${lvl==='freezing'?`
      <path d="M93 28 Q150 40 207 28 L207 46 Q150 58 93 46 Z" fill="#d45858"/>
      <path d="M108 40 Q106 58 112 66 Q120 72 136 70 Q142 64 142 44" fill="#d45858"/>
    `:``}

    <!-- Umbrella -->
    ${rain?`
      <line x1="228" y1="55" x2="242" y2="208" stroke="#6b5a4a" stroke-width="3.5" stroke-linecap="round"/>

      <!-- Rain drops left side -->
      ${[[28,60],[18,100],[35,145],[22,190]].map(([x,y])=>`<line x1="${x}" y1="${y}" x2="${x-3}" y2="${y+26}" stroke="#8aadcc" stroke-width="1.8" opacity=".45" stroke-linecap="round"/>`).join('')}

    ${isSports?`<path d="M100 6 Q150 -6 200 6" stroke="white" stroke-width="6" fill="none" stroke-linecap="round" opacity=".88"/>`:``}

}

// ─── LABELS around character ──────────────────────────────────────────────────
function renderCharLabels(outfit, rain, temp) {
  const lvl = temp<=5?'freezing':temp<=12?'cold':temp<=20?'mild':temp<=28?'warm':'hot';
  const noOuter = !outfit.outer||outfit.outer.trim()==='';
  const labels = document.getElementById('charLabels');

  // We position labels relative to the .char-stage container (300px wide)
  // Face wrap is 150px at center (top:0, left:75px)
  // Body wrap starts at top:120px (face 150px - 30px overlap)
  // Total stage height ≈ 120 + body SVG rendered height

  const chips = [
    // [text, top%, left%, side]  side: 'left'|'right'
    outfit.top   && [outfit.top.split('/')[0].trim(),   '34%', null,  'left'],
    !noOuter     && [outfit.outer.split('/')[0].trim(), '48%', null,  'left'],
    outfit.bottom&& [outfit.bottom.split('/')[0].trim(),'64%', null,  'left'],
    outfit.shoes && [outfit.shoes.split('/')[0].trim(), '84%', null,  'left'],
    outfit.acc   && [outfit.acc.split('・')[0].trim(),  '36%', null,  'right'],
    rain         && ['雨傘（必備）',                    '52%', null,  'right'],
    (lvl==='freezing')&&['毛帽',                        '12%', null,  'right'],
  ].filter(Boolean);

  labels.innerHTML = chips.map(([text, top, _, side]) => {
    const isLeft = side==='left';
    return `<div class="char-label" style="top:${top};${isLeft?'left:2px':'right:2px'};">${text}</div>`;
  }).join('');
}

// ─── OCCASION & STYLE ─────────────────────────────────────────────────────────
function setOccasion(occ, btn) {
  S.occasion=occ;
  document.querySelectorAll('.occasion-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(S.weather) generateOutfit();
}
function setStyle(sty, btn) {
  S.style=sty;
  document.querySelectorAll('.style-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(S.weather) generateOutfit();
}

// ─── WARDROBE ─────────────────────────────────────────────────────────────────
function setupCatTabs(id, cb) {
  document.getElementById(id).querySelectorAll('.category-tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      document.getElementById(id).querySelectorAll('.category-tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active'); cb(tab.dataset.cat);
    });
  });
}
function handleUpload(e) {
  const files=Array.from(e.target.files); if(!files.length) return;
  let done=0;
  files.forEach(f=>{
    const r=new FileReader();
    r.onload=ev=>{
      S.wardrobe.push({id:Date.now()+Math.random(),name:f.name.replace(/\.[^.]+$/,''),category:S.addCat,image:ev.target.result,at:new Date().toISOString()});
      if(++done===files.length){saveWardrobe();renderWardrobe();showToast(`✅ 已加入 ${done} 件衣物`);}
    };
    r.readAsDataURL(f);
  });
  e.target.value='';
}
function saveWardrobe(){try{localStorage.setItem('sw_wardrobe',JSON.stringify(S.wardrobe));}catch(e){showToast('⚠️ 儲存空間不足');}}
function renderWardrobe(){
  const filtered=S.viewCat==='all'?S.wardrobe:S.wardrobe.filter(i=>i.category===S.viewCat);
  const catN={all:'衣物',top:'上衣',bottom:'下著',outer:'外套',shoes:'鞋子',acc:'配件'};
  const cEl=document.getElementById('wardrobeCount'); if(cEl) cEl.textContent=`(${S.wardrobe.length})`;
  const grid=document.getElementById('wardrobeGrid');
  if(!filtered.length){grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1;"><div class="emoji">🪞</div><div>沒有${catN[S.viewCat]}</div><div style="font-size:.77rem;margin-top:4px;">快去上傳衣物吧！</div></div>`;return;}
  grid.innerHTML=filtered.map(item=>`<div class="wardrobe-item"><img src="${item.image}" alt="${item.name}" loading="lazy"><div class="item-label">${item.name}</div><button class="item-delete" onclick="deleteItem(event,'${item.id}')">✕</button></div>`).join('');
}
function deleteItem(e,id){e.stopPropagation();S.wardrobe=S.wardrobe.filter(i=>String(i.id)!==String(id));saveWardrobe();renderWardrobe();showToast('已從衣櫥移除');}

// ─── WEEKLY ───────────────────────────────────────────────────────────────────
const dayNm=['週日','週一','週二','週三','週四','週五','週六'];
function renderWeekly(){
  const el=document.getElementById('weeklyForecast');
  if(!S.forecast){el.innerHTML='<div class="loading">🌤 請先搜尋城市</div>';return;}
  el.innerHTML=S.forecast.slice(0,7).map((day,i)=>{
    const dt=new Date(day.date), label=i===0?'今天':i===1?'明天':dayNm[dt.getDay()];
    const max=parseInt(day.maxtempC),min=parseInt(day.mintempC),avg=Math.round((max+min)/2);
    const h=day.hourly[Math.floor(day.hourly.length/2)]||day.hourly[0];
    const code=parseInt(h.weatherCode||'116'), rainPct=parseInt(h.chanceofrain||'0');
    const outfit=(outfitByTemp(avg)[S.occasion]||outfitByTemp(avg).casual);
    return `<div class="week-day-card">
      <div style="font-size:1.8rem;">${wIcon(code)}</div>
      <div class="week-day-info">
        <div class="week-day-name">${label} · ${dt.getMonth()+1}/${dt.getDate()}</div>
        <div class="week-day-weather"><span style="color:${tColor(max)}">${max}°</span><span style="color:var(--text-muted)"> / ${min}°</span>${rainPct>30?` · ☔ ${rainPct}%`:''}</div>
        <div class="week-day-outfit">👕 ${outfit.top}${(!outfit.outer||outfit.outer.trim()==='')?'':' · 🧥 '+outfit.outer}${rainPct>30?' · ☂️ 帶傘':''}</div>
      </div>
      <div style="font-size:1.05rem;font-weight:800;color:${tColor(max)}">${max}°</div>
    </div>`;
  }).join('');
}

// ─── HISTORY ──────────────────────────────────────────────────────────────────
function recordOutfit(){
  if(!S.weather){showToast('請先搜尋天氣');return;}
  const w=S.weather, outfit=outfitByTemp(w.temp)[S.occasion]||outfitByTemp(w.temp).casual;
  const now=new Date(), today=now.toDateString();
  const record={id:Date.now(),date:now.toISOString(),weather:{temp:w.temp,desc:w.desc,city:w.city,code:w.code},outfit,occasion:S.occasion,style:S.style};
  const idx=S.history.findIndex(h=>new Date(h.date).toDateString()===today);
  if(idx>=0){S.history[idx]=record;showToast('✅ 已更新今日穿搭記錄');}
  else{S.history.unshift(record);showToast('✅ 穿搭已記錄！');}
  S.history=S.history.slice(0,30);
  localStorage.setItem('sw_history',JSON.stringify(S.history));
  renderHistory();
}
function renderHistory(){
  const el=document.getElementById('historyList');
  const cEl=document.getElementById('historyCount'); if(cEl) cEl.textContent=`(${S.history.length})`;
  if(!S.history.length){el.innerHTML='<div class="empty-state"><div class="emoji">📝</div><div>還沒有穿搭記錄</div></div>';return;}
  const occLbl={casual:'日常',work:'上班',date:'約會',sports:'運動'};
  el.innerHTML=S.history.map(r=>{
    const d=new Date(r.date);
    return `<div class="history-item">
      <div class="history-date"><div class="day">${d.getDate()}</div><div>${d.getMonth()+1}月</div><div style="font-size:.72rem">${dayNm[d.getDay()]}</div></div>
      <div style="flex:1;">
        <div style="font-weight:700;margin-bottom:3px;">${wIcon(r.weather?.code||116)} ${r.weather?.temp||'--'}°C · ${r.weather?.city||''}</div>
        <div style="font-size:.77rem;color:var(--text-muted);">場合：${occLbl[r.occasion]||'日常'} · 風格：${r.style}</div>
        <div style="font-size:.81rem;margin-top:4px;">👕 ${r.outfit?.top||'-'}</div>
        ${r.outfit?.outer&&r.outfit.outer.trim()?`<div style="font-size:.81rem;">🧥 ${r.outfit.outer}</div>`:''}
      </div>
      <button onclick="deleteHistory(${r.id})" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem;padding:4px;align-self:flex-start;">✕</button>
    </div>`;
  }).join('');
}
function deleteHistory(id){S.history=S.history.filter(h=>h.id!==id);localStorage.setItem('sw_history',JSON.stringify(S.history));renderHistory();showToast('已刪除記錄');}

// ─── NOTIFICATIONS ────────────────────────────────────────────────────────────
function checkNotifications(){
  if(!S.weather) return;
  const w=S.weather, rain=isRain(w);
  let msg='';
  if(rain) msg=`☔ ${w.city} 今天有雨，記得帶傘！`;
  else if(w.temp<=5) msg=`🥶 氣溫只有 ${w.temp}°C！穿厚外套、圍巾手套必備。`;
  else if(w.temp>=32) msg=`🔥 今天 ${w.temp}°C 超熱！記得防曬補水。`;
  else if(w.humidity>85) msg=`💦 濕度高達 ${w.humidity}%，選透氣吸濕材質。`;
  const banner=document.getElementById('notificationBanner');
  if(msg){
    document.getElementById('notificationText').textContent=msg;
    banner.style.display='flex';
    if('Notification' in window&&Notification.permission==='granted'){try{new Notification('StyleWeather 👗',{body:msg});}catch(e){}}
  } else banner.style.display='none';
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
let _tt;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2800);}

init();
</script>
