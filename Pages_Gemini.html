<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能穿搭助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com');
        .hand-drawn { font-family: 'Handlee', cursive; }
        .canvas-container { position: relative; width: 300px; height: 400px; background: #fdf6e3; border: 2px solid #5d4037; border-radius: 20px; }
        .clothes-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body class="bg-amber-50 text-gray-800 min-h-screen pb-20">

    <!-- Header -->
    <header class="p-6 bg-white shadow-sm flex justify-between items-center">
        <h1 class="text-2xl font-bold text-orange-600">StyleWeather AI</h1>
        <div class="text-right">
            <p id="location" class="text-sm font-semibold">台北市, 台灣</p>
            <p id="weather-info" class="text-xs text-gray-500">載入天氣中...</p>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4">
        
        <!-- 天氣卡片 -->
        <section class="bg-blue-100 rounded-3xl p-5 mb-6 flex items-center justify-between shadow-inner">
            <div>
                <p class="text-3xl font-bold text-blue-900" id="temp-display">22°C</p>
                <p class="text-blue-700" id="weather-desc">多雲時晴 (降雨機率 20%)</p>
            </div>
            <div class="text-4xl">🌤️</div>
        </section>

        <!-- 虛擬模特兒展示區 -->
        <section class="flex flex-col items-center mb-8">
            <div class="canvas-container shadow-lg flex items-center justify-center">
                <!-- 手繪底圖人物 -->
                <img src="https://cdn-icons-png.flaticon.com" class="w-48 opacity-20" alt="Avatar">
                <!-- 穿著圖層 (模擬) -->
                <div id="outfit-preview" class="text-center p-4">
                    <p class="hand-drawn text-lg text-gray-600">今日推薦穿搭呈現於此</p>
                </div>
            </div>
            <div class="mt-4 bg-white p-4 rounded-2xl w-full border-l-4 border-orange-400 shadow-sm">
                <h3 class="font-bold text-orange-800">💡 穿搭建議：</h3>
                <p id="ai-suggestion" class="text-sm text-gray-600 mt-1">
                    今天氣溫舒適但稍有涼意，建議穿著**薄長袖**搭配**休閒長褲**。晚間可能有雨，建議攜帶輕便摺疊傘。
                </p>
            </div>
        </section>

        <!-- 虛擬衣櫃與功能區 -->
        <section class="grid grid-cols-2 gap-4">
            <button onclick="document.getElementById('upload-input').click()" class="bg-orange-500 text-white p-4 rounded-2xl flex flex-col items-center shadow-md">
                <span class="text-2xl mb-1">👕</span>
                <span class="font-bold">新增衣物</span>
            </button>
            <input type="file" id="upload-input" class="hidden" accept="image/*" onchange="addWardrobe()">
            
            <button class="bg-white border-2 border-orange-500 text-orange-500 p-4 rounded-2xl flex flex-col items-center shadow-md">
                <span class="text-2xl mb-1">📅</span>
                <span class="font-bold">週計畫</span>
            </button>
        </section>

        <!-- 場合分類 -->
        <div class="mt-6">
            <p class="font-bold mb-3">切換場合：</p>
            <div class="flex gap-2 overflow-x-auto pb-2">
                <button class="px-4 py-2 bg-gray-200 rounded-full text-sm whitespace-nowrap active:bg-orange-200">💼 上班</button>
                <button class="px-4 py-2 bg-gray-200 rounded-full text-sm whitespace-nowrap active:bg-orange-200">☕ 約會</button>
                <button class="px-4 py-2 bg-gray-200 rounded-full text-sm whitespace-nowrap active:bg-orange-200">🏃 運動</button>
                <button class="px-4 py-2 bg-gray-200 rounded-full text-sm whitespace-nowrap active:bg-orange-200">🏠 居家</button>
            </div>
        </div>
    </main>

    <script>
        // 模擬天氣數據
        const mockWeather = {
            temp: 18,
            rain: 60,
            status: "下雨"
        };

        // 自動穿搭邏輯
        function updateSuggestion() {
            const suggestionBox = document.getElementById('ai-suggestion');
            const preview = document.getElementById('outfit-preview');
            
            if (mockWeather.temp < 15) {
                suggestionBox.innerText = "天氣寒冷！建議穿著厚毛衣與大衣。";
                preview.innerHTML = "🧥 + 🧣<br>厚重保暖裝扮";
            } else if (mockWeather.rain > 50) {
                suggestionBox.innerText = "明天下雨，記得帶傘並穿著防潑水外套與深色長褲。";
                preview.innerHTML = "🧥 + ☔<br>防雨穿搭模式";
            }
        }

        function addWardrobe() {
            alert('衣物已成功上傳至虛擬衣櫃！AI 正在為您分類...');
        }

        // 初始化
        window.onload = () => {
            document.getElementById('weather-info').innerText = `濕度 75% | ${mockWeather.status}`;
            updateSuggestion();
        };
    </script>
</body>
</html>
